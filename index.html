<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FoundrFlow — Investor Evaluation Report · Day 23 Blueprint</title>
<style>
/* ── RESET & BASE ────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{
  background:#0B1020;
  color:#EAECEF;
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  line-height:1.6;
  min-height:100vh;
  overflow-x:hidden;
}
/* Google Font inline fallback — Inter via @import */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

/* ── CSS TOKENS ──────────────────────────────────────────────── */
:root{
  --bg:#0B1020;
  --bg2:#111827;
  --bg3:#1a2235;
  --primary:#6D5EF5;
  --primary-soft:rgba(109,94,245,.15);
  --success:#00C48C;
  --success-soft:rgba(0,196,140,.12);
  --warning:#FFB020;
  --warning-soft:rgba(255,176,32,.12);
  --danger:#FF5A5F;
  --danger-soft:rgba(255,90,95,.12);
  --text:#EAECEF;
  --text-muted:#8B93A7;
  --border:rgba(255,255,255,.08);
  --glass:rgba(255,255,255,.04);
  --glass-border:rgba(255,255,255,.1);
  --radius:14px;
  --radius-lg:22px;
  --shadow:0 4px 32px rgba(0,0,0,.45);
  --transition:all .28s cubic-bezier(.4,0,.2,1);
}

/* ── TYPOGRAPHY ──────────────────────────────────────────────── */
h1{font-size:clamp(2rem,5vw,3.6rem);font-weight:800;letter-spacing:-.03em;line-height:1.1}
h2{font-size:clamp(1.4rem,3vw,2rem);font-weight:700;letter-spacing:-.02em}
h3{font-size:1.15rem;font-weight:600;letter-spacing:-.01em}
h4{font-size:.9rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)}
p{color:var(--text-muted);font-size:.95rem;line-height:1.7}
strong{color:var(--text);font-weight:600}

/* ── LAYOUT ──────────────────────────────────────────────────── */
.container{max-width:1200px;margin:0 auto;padding:0 24px}
section{padding:80px 0}
section+section{border-top:1px solid var(--border)}

/* ── GLASS CARD ──────────────────────────────────────────────── */
.card{
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  padding:28px;
  backdrop-filter:blur(12px);
  transition:var(--transition);
}
.card:hover{border-color:rgba(109,94,245,.3);transform:translateY(-2px);box-shadow:0 8px 40px rgba(109,94,245,.12)}
.card-sm{padding:20px}

/* ── BADGE ───────────────────────────────────────────────────── */
.badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;
  padding:4px 10px;border-radius:99px;
}
.badge-primary{background:var(--primary-soft);color:var(--primary)}
.badge-success{background:var(--success-soft);color:var(--success)}
.badge-warning{background:var(--warning-soft);color:var(--warning)}
.badge-danger{background:var(--danger-soft);color:var(--danger)}

/* ── GRID ────────────────────────────────────────────────────── */
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}

/* ── DIVIDER ─────────────────────────────────────────────────── */
.divider{height:1px;background:var(--border);margin:40px 0}
.page-break-label{
  display:flex;align-items:center;gap:16px;
  font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.14em;
  color:rgba(255,255,255,.18);margin:56px 0 8px;
}
.page-break-label::before,.page-break-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── HERO ────────────────────────────────────────────────────── */
#hero{
  padding:100px 0 80px;
  position:relative;overflow:hidden;
}
#hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(109,94,245,.22) 0%,transparent 70%);
  pointer-events:none;
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;
  color:var(--primary);margin-bottom:20px;
}
.hero-eyebrow span{width:28px;height:2px;background:var(--primary);border-radius:2px}
.hero-meta{display:flex;flex-wrap:wrap;gap:12px;margin-top:28px}
.hero-stat{
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:10px;padding:14px 20px;
  display:flex;flex-direction:column;gap:2px;
}
.hero-stat strong{font-size:1.4rem;font-weight:800;color:var(--primary)}
.hero-stat span{font-size:.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em}
.hero-actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:36px}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  font-size:.85rem;font-weight:600;
  padding:11px 22px;border-radius:10px;border:none;cursor:pointer;
  transition:var(--transition);text-decoration:none;
}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#7d70f7;transform:translateY(-1px);box-shadow:0 8px 24px rgba(109,94,245,.4)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--glass-border)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-soft)}

/* ── STICKY TOC ──────────────────────────────────────────────── */
#toc{
  position:fixed;top:50%;right:20px;transform:translateY(-50%);
  z-index:100;display:flex;flex-direction:column;gap:8px;
  opacity:.6;transition:opacity .2s;
}
#toc:hover{opacity:1}
.toc-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--border);cursor:pointer;transition:var(--transition);
  position:relative;
}
.toc-dot.active{background:var(--primary);transform:scale(1.4)}
.toc-dot:hover{background:var(--primary)}
.toc-dot::before{
  content:attr(data-label);
  position:absolute;right:16px;top:50%;transform:translateY(-50%);
  font-size:.7rem;font-weight:600;white-space:nowrap;
  color:var(--text);background:var(--bg3);
  padding:3px 8px;border-radius:6px;border:1px solid var(--glass-border);
  opacity:0;pointer-events:none;transition:opacity .15s;
}
.toc-dot:hover::before{opacity:1}

/* ── SECTION HEADER ──────────────────────────────────────────── */
.section-header{margin-bottom:40px}
.section-header h4{margin-bottom:8px}
.section-header h2{margin-bottom:12px}
.section-header p{max-width:580px}

/* ── SNAPSHOT BULLETS ────────────────────────────────────────── */
.snapshot-list{list-style:none;display:flex;flex-direction:column;gap:10px}
.snapshot-list li{
  display:flex;align-items:flex-start;gap:12px;
  font-size:.9rem;color:var(--text-muted);
}
.snapshot-list li::before{
  content:'';width:6px;height:6px;border-radius:50%;
  background:var(--primary);margin-top:7px;flex-shrink:0;
}
.snapshot-list li strong{color:var(--text)}

/* ── CANVAS GRID ─────────────────────────────────────────────── */
.canvas-grid{
  display:grid;
  grid-template-columns:1fr 2fr 1fr;
  grid-template-rows:auto auto;
  gap:12px;
}
.canvas-cell{
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--radius);padding:20px;
}
.canvas-full{grid-column:1/-1}
.canvas-cell h4{font-size:.72rem;margin-bottom:8px}
.canvas-cell ul{list-style:none;display:flex;flex-direction:column;gap:6px}
.canvas-cell ul li{font-size:.82rem;color:var(--text-muted);padding-left:12px;position:relative}
.canvas-cell ul li::before{content:'→';position:absolute;left:0;color:var(--primary);font-size:.8rem}

/* ── REVENUE TABLE ───────────────────────────────────────────── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:.85rem}
thead th{
  text-align:left;font-size:.72rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);
  padding:12px 16px;border-bottom:1px solid var(--border);
}
tbody td{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text-muted)}
tbody td:first-child{color:var(--text);font-weight:500}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--glass)}

/* ── FUNNEL ──────────────────────────────────────────────────── */
.funnel{display:flex;flex-direction:column;gap:8px;max-width:520px;margin:0 auto}
.funnel-step{
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--radius);padding:18px 24px;
  display:flex;align-items:center;gap:16px;
  transition:var(--transition);position:relative;
}
.funnel-step:hover{border-color:var(--primary-soft);background:var(--primary-soft)}
.funnel-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;flex-shrink:0;
}
.funnel-arrow{text-align:center;color:var(--text-muted);font-size:1.1rem;margin:-2px 0}

/* ── CAC STRATEGY ────────────────────────────────────────────── */
.cac-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.cac-card{
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--radius);padding:20px;
}
.cac-card .channel{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.cac-card h3{font-size:1rem;margin-bottom:6px}
.cac-card p{font-size:.8rem}

/* ── TIMELINE ────────────────────────────────────────────────── */
.timeline{position:relative;padding-left:32px}
.timeline::before{content:'';position:absolute;left:8px;top:8px;bottom:8px;width:2px;background:var(--border)}
.timeline-item{position:relative;margin-bottom:28px}
.timeline-item::before{
  content:'';position:absolute;left:-28px;top:6px;
  width:12px;height:12px;border-radius:50%;
  background:var(--primary);border:2px solid var(--bg);
  box-shadow:0 0 0 3px var(--primary-soft);
}
.timeline-item .week{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--primary);margin-bottom:4px}
.timeline-item h3{font-size:.95rem;margin-bottom:6px}
.timeline-item p{font-size:.83rem}

/* ── COMPETITOR MATRIX ───────────────────────────────────────── */
.matrix-table{width:100%;border-collapse:collapse;font-size:.82rem}
.matrix-table th{
  background:var(--glass);padding:12px 16px;
  font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;
  color:var(--text-muted);border:1px solid var(--border);text-align:center;
}
.matrix-table th:first-child{text-align:left}
.matrix-table td{padding:12px 16px;border:1px solid var(--border);text-align:center;color:var(--text-muted)}
.matrix-table td:first-child{text-align:left;color:var(--text);font-weight:600}
.matrix-table tr:nth-child(2){background:rgba(109,94,245,.07)}
.check{color:var(--success)}
.cross{color:var(--danger)}
.partial{color:var(--warning)}

/* ── SWOT ────────────────────────────────────────────────────── */
.swot-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;border-radius:var(--radius-lg);overflow:hidden}
.swot-cell{padding:28px;background:var(--glass)}
.swot-cell:nth-child(1){background:rgba(0,196,140,.07);border-radius:var(--radius-lg) 0 0 0}
.swot-cell:nth-child(2){background:rgba(255,90,95,.07);border-radius:0 var(--radius-lg) 0 0}
.swot-cell:nth-child(3){background:rgba(109,94,245,.07);border-radius:0 0 0 var(--radius-lg)}
.swot-cell:nth-child(4){background:rgba(255,176,32,.07);border-radius:0 0 var(--radius-lg) 0}
.swot-cell h3{margin-bottom:14px;font-size:.95rem}
.swot-cell ul{list-style:none;display:flex;flex-direction:column;gap:8px}
.swot-cell ul li{font-size:.83rem;color:var(--text-muted);padding-left:14px;position:relative}
.swot-cell ul li::before{position:absolute;left:0}
.swot-cell:nth-child(1) ul li::before{content:'✓';color:var(--success)}
.swot-cell:nth-child(2) ul li::before{content:'✗';color:var(--danger)}
.swot-cell:nth-child(3) ul li::before{content:'↗';color:var(--primary)}
.swot-cell:nth-child(4) ul li::before{content:'⚠';color:var(--warning)}

/* ── ACTION SHEET ────────────────────────────────────────────── */
.action-item{
  display:grid;grid-template-columns:32px 1fr repeat(3,140px);
  align-items:start;gap:16px;
  padding:16px;border-bottom:1px solid var(--border);
  transition:var(--transition);
}
.action-item:hover{background:var(--glass)}
.action-item:last-child{border-bottom:none}
.action-num{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:700;
  background:var(--primary-soft);color:var(--primary);flex-shrink:0;
}
.action-title{font-size:.88rem;font-weight:500;color:var(--text);margin-bottom:4px}
.action-detail{font-size:.78rem;color:var(--text-muted)}
.action-meta{font-size:.78rem;color:var(--text-muted)}
.action-meta strong{display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:2px}

/* ── SCORECARD / GAUGE ───────────────────────────────────────── */
.scorecard-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
.gauge-card{
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--radius);padding:24px;text-align:center;
}
.gauge-wrap{position:relative;width:120px;height:70px;margin:0 auto 16px}
.gauge-svg{width:120px;height:70px}
.gauge-score{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  font-size:1.5rem;font-weight:800;
}
.gauge-card h3{font-size:.9rem;margin-bottom:6px}
.gauge-card p{font-size:.75rem}

/* ── VERDICT ─────────────────────────────────────────────────── */
.verdict-banner{
  border-radius:var(--radius-lg);padding:40px;
  border:1px solid var(--glass-border);
  text-align:center;position:relative;overflow:hidden;
}
.verdict-banner::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 80% at 50% 50%,rgba(0,196,140,.08) 0%,transparent 70%);
}
.verdict-emoji{font-size:3.5rem;margin-bottom:12px;display:block}
.verdict-label{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--success);margin-bottom:8px}
.verdict-score-big{font-size:4rem;font-weight:900;color:var(--success);line-height:1;margin-bottom:8px}

/* ── PITCH ───────────────────────────────────────────────────── */
.pitch-box{
  background:linear-gradient(135deg,rgba(109,94,245,.12) 0%,rgba(0,196,140,.06) 100%);
  border:1px solid rgba(109,94,245,.25);
  border-radius:var(--radius-lg);padding:36px;
  font-size:1.05rem;line-height:1.8;color:var(--text);
  font-style:italic;
  position:relative;
}
.pitch-box::before{content:'"';font-size:5rem;color:var(--primary);opacity:.2;position:absolute;top:-10px;left:20px;font-family:Georgia,serif;line-height:1}

/* ── INFOGRAPHIC SVG ─────────────────────────────────────────── */
#infographic-wrap{
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--radius-lg);overflow:hidden;padding:8px;
}
#infographic-wrap svg{width:100%;height:auto;display:block}

/* ── SUSTAINABILITY VERDICT ──────────────────────────────────── */
.sustain-box{
  background:linear-gradient(135deg,rgba(109,94,245,.1),rgba(0,196,140,.08));
  border:1px solid rgba(109,94,245,.2);
  border-radius:var(--radius-lg);padding:36px;
}
.sustain-box p{font-size:1rem;color:var(--text);line-height:1.8;margin-bottom:16px}
.sustain-box p:last-child{margin-bottom:0}

/* ── COLLAPSIBLE ─────────────────────────────────────────────── */
.collapsible-header{
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;user-select:none;
}
.collapsible-header .chevron{
  width:20px;height:20px;color:var(--text-muted);
  transition:transform .25s;flex-shrink:0;
}
.collapsible-content{overflow:hidden;transition:max-height .35s ease;max-height:2000px}
.collapsible-content.collapsed{max-height:0}
.collapsible-header.closed .chevron{transform:rotate(-90deg)}

/* ── PROGRESS BAR ────────────────────────────────────────────── */
.progress-bar{height:6px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}

/* ── OVERALL SCORE ───────────────────────────────────────────── */
.overall-ring{position:relative;width:160px;height:160px;margin:0 auto 24px;flex-shrink:0}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-label .num{font-size:2.4rem;font-weight:900;color:var(--success)}
.ring-label .sub{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)}

/* ── STICKY PROGRESS BAR ──────────────────────────────────────── */
#read-progress{
  position:fixed;top:0;left:0;height:3px;
  background:linear-gradient(90deg,var(--primary),var(--success));
  z-index:200;width:0%;transition:width .1s linear;
}

/* ── BACK TO TOP ─────────────────────────────────────────────── */
#back-top{
  position:fixed;bottom:28px;right:28px;
  width:40px;height:40px;border-radius:12px;
  background:var(--primary);color:#fff;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;opacity:0;pointer-events:none;
  transition:var(--transition);z-index:100;
}
#back-top.visible{opacity:1;pointer-events:auto}
#back-top:hover{background:#7d70f7;transform:translateY(-2px)}

/* ── REALIY CHECK ITEMS ──────────────────────────────────────── */
.rc-item{display:flex;gap:16px;align-items:flex-start;padding:16px;border-radius:10px;background:var(--glass);margin-bottom:10px}
.rc-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}

/* ── PRINT ───────────────────────────────────────────────────── */
@media print{
  body{background:#fff!important;color:#111!important;font-size:12pt}
  #toc,#back-top,#read-progress,.btn,.hero-actions{display:none!important}
  .card,.canvas-cell,.cac-card,.gauge-card,.swot-cell,.action-item,.funnel-step{
    background:#f8f8f8!important;border:1px solid #ddd!important;
    box-shadow:none!important;backdrop-filter:none!important;
  }
  section{padding:40pt 0;break-inside:avoid}
  h1,h2,h3{color:#111!important}
  p,span,.text-muted,li{color:#333!important}
  .page-break-label{page-break-before:always;padding-top:20pt;border-top:2px solid #ccc}
  table{break-inside:avoid}
  .swot-grid,.scorecard-grid,.grid-2,.grid-3,.grid-4{break-inside:avoid}
  .verdict-banner{background:#f0f9f5!important;border:2px solid #00C48C!important}
  @page{size:A4;margin:2cm}
}

/* ── RESPONSIVE ──────────────────────────────────────────────── */
@media(max-width:768px){
  section{padding:52px 0}
  .canvas-grid{grid-template-columns:1fr}
  .swot-grid{grid-template-columns:1fr}
  .action-item{grid-template-columns:32px 1fr;gap:10px}
  .action-item .action-meta{display:none}
  #toc{display:none}
  .matrix-table{font-size:.75rem}
  .matrix-table th,.matrix-table td{padding:8px 10px}
}
</style>
</head>
<body>

<!-- Read progress -->
<div id="read-progress"></div>

<!-- Sticky TOC -->
<nav id="toc" aria-label="Table of contents">
  <div class="toc-dot active" data-label="Overview" data-section="hero"></div>
  <div class="toc-dot" data-label="Snapshot" data-section="snapshot"></div>
  <div class="toc-dot" data-label="Reality Check" data-section="reality"></div>
  <div class="toc-dot" data-label="Canvas" data-section="canvas"></div>
  <div class="toc-dot" data-label="Revenue" data-section="revenue"></div>
  <div class="toc-dot" data-label="GTM" data-section="gtm"></div>
  <div class="toc-dot" data-label="Acquisition" data-section="acquisition"></div>
  <div class="toc-dot" data-label="First 100" data-section="first100"></div>
  <div class="toc-dot" data-label="Competitive" data-section="competitive"></div>
  <div class="toc-dot" data-label="SWOT" data-section="swot"></div>
  <div class="toc-dot" data-label="Pitch" data-section="pitch"></div>
  <div class="t
